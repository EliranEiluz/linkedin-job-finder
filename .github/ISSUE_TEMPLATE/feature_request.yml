name: Feature request
description: Propose a new capability or enhancement
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      description: Describe the user-facing pain, not the implementation. Skip "I want X" — what does X let you do?
      placeholder: When I run a scrape with N priority companies, I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Sketch the change. Mockups, pseudocode, or prose all welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today and why aren't they enough.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Backend only
        - UI only
        - Both
        - Docs / project hygiene
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: willing
    attributes:
      label: Willing to contribute
      options:
        - label: I'd be willing to send a PR for this
